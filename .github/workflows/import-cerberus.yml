ero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:32px}.button{display:inline-flex;align-items:center;justify-content:center;padding:13px 17px;background:var(--acid);color:var(--ink);text-decoration:none;font-size:.67rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.button.ghost{background:transparent;color:var(--paper);border:1px solid var(--line)}.hero-card{padding:28px;border:1px solid var(--line);background:rgba(255,255,255,.035)}.hero-card>p{margin:0 0 18px;color:var(--muted);font-size:.59rem;font-weight:900;letter-spacing:.15em}.hero-card ol{list-style:none;margin:0;padding:0}.hero-card li{display:flex;justify-content:space-between;gap:18px;padding:13px 0;border-top:1px solid var(--line)}.hero-card li b{font:400 1.2rem Georgia}.hero-card li span{color:var(--muted);font-size:.67rem;text-align:right}.hero-card>div{display:flex;justify-content:space-between;align-items:end;margin-top:19px;padding-top:19px;border-top:1px solid var(--line)}.hero-card small{color:var(--muted);font-size:.6rem;text-transform:uppercase}.hero-card strong{color:var(--rust);font:400 2rem Georgia}.section{padding:95px clamp(20px,6vw,92px);scroll-margin-top:84px}.dark{background:var(--panel)}.paper{background:#d8d3c7;color:var(--ink)}.section-head,.module-head{display:grid;grid-template-columns:.95fr 1.05fr;gap:60px;align-items:end}.section-head h2,.module-head h2{font-size:clamp(3rem,5.8vw,6.3rem);line-height:.9}.section-head>p{margin:0;color:var(--muted)}.overview{background:var(--paper);color:var(--ink)}.overview .section-head>p{color:#62685f}.module-map{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:42px;background:rgba(23,26,22,.18)}.module-map a{min-height:270px;padding:25px;background:#efebe1;text-decoration:none;display:flex;flex-direction:column}.module-map a:hover{background:white}.module-map b{color:var(--rust);font-size:.67rem}.module-map h3{margin:38px 0 9px;font:400 1.55rem Georgia}.module-map p{margin:0;color:#666d64;font-size:.76rem}.module-map span{margin-top:auto;padding-top:18px;border-top:1px solid rgba(23,26,22,.14);font-size:.61rem;font-weight:900;text-transform:uppercase}.module-map .hot{background:#171b18;color:var(--paper);box-shadow:inset 0 4px var(--rust)}.module-map .hot p{color:#aeb5ac}.module{overflow:hidden}.module-head>div:last-child{display:flex;align-items:center;justify-content:flex-end;gap:12px}.module-head a{font-size:.65rem;text-decoration:none;border-bottom:1px solid currentColor}.status{padding:5px 8px;border:1px solid currentColor;color:var(--cyan);font-size:.55rem;font-weight:900;letter-spacing:.1em}.status.executable{background:var(--rust);border-color:var(--rust);color:var(--ink)}.module-note{max-width:820px;margin:18px 0 32px;color:var(--muted)}.paper .module-note{color:#62685f}.frame-shell{position:relative;width:100%;min-height:720px;border:1px solid var(--line);background:#050705;box-shadow:0 30px 90px rgba(0,0,0,.28)}.paper .frame-shell{border-color:rgba(23,26,22,.18)}iframe{display:block;width:100%;height:980px;border:0;background:#080b09}.kernel-section{background:linear-gradient(180deg,#1a100d,#0b0e0b);box-shadow:inset 0 5px var(--rust)}.kernel-frame{border-color:rgba(239,107,80,.65)}.code{background:var(--paper);color:var(--ink)}.code .section-head>p{color:#62685f}.code-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:42px}.code-grid a{min-height:165px;padding:20px;border:1px solid rgba(23,26,22,.16);background:rgba(255,255,255,.36);text-decoration:none;display:flex;flex-direction:column}.code-grid a:hover{background:white;transform:translateY(-2px)}.code-grid small{color:#777d74;font-size:.55rem;font-weight:900;letter-spacing:.11em}.code-grid strong{margin:25px 0 8px;font:400 1.15rem Georgia}.code-grid span{margin-top:auto;color:#646a62;font-size:.62rem}.boundary{padding:100px clamp(20px,7vw,108px);background:var(--rust);color:var(--ink)}.boundary h2{max-width:1050px;font-size:clamp(3.2rem,6vw,6.6rem);line-height:.9}.boundary>
                  <a href="CERBERUS_PAGES_README.md"><small>ARCHIVE</small><strong>Original project guide</strong><span>Read transferred README →</span></a>
                </div>
              </section>

              <section class="boundary">
                <p class="eyebrow">Evidence boundary</p>
                <h2>Executable does not mean flight-certified.</h2>
                <div><p><b>Present:</b> inspectable browser demonstrations, explicit authority topology, executable C state-machine logic, unit tests, randomized property testing, sanitizer CI, and a CBMC harness.</p><p><b>Not established:</b> mission-valid thresholds, operational detector performance, cryptographic provenance, hard real-time guarantees, hardware isolation, certification credit, or a completed spacecraft safety case.</p></div>
                <blockquote>Evidence may reduce permission. It cannot manufacture authority.</blockquote>
              </section>
            </main>

            <footer><span>Copyright © 2026 Emily Echterhoff. All rights reserved.</span><a href="#top">Return to top ↑</a></footer>
            <script src="cerberusx.js"></script>
          </body>
          </html>
          HTML


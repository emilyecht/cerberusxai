              </section>

              <section id="code" class="code section">
                <header class="section-head">
                  <div><p class="eyebrow">Repository surface</p><h2>Code, proofs, tests, and specifications.</h2></div>
                  <p>The transfer preserves the original CERBERUS Pages artifacts and adds this unified shell. Browser demonstrations remain explanatory; the C kernel establishes only its declared software properties under stated assumptions.</p>
                </header>
                <div class="code-grid">
                  <a href="flight-reference/README.md"><small>REFERENCE</small><strong>C11 kernel guide</strong><span>Build and test instructions →</span></a>
                  <a href="flight-reference/specification/authority-state-machine.md"><small>SPECIFICATION</small><strong>Authority state machine</strong><span>Requirements and traceability →</span></a>
                  <a href="flight-reference/specification/message-contracts.md"><small>CONTRACTS</small><strong>Message boundaries</strong><span>Origins, epochs, and capabilities →</span></a>
                  <a href="flight-reference/tests/test_authority.c"><small>UNIT TESTS</small><strong>Named authority properties</strong><span>Inspect tests →</span></a>
                  <a href="flight-reference/tests/property_campaign.c"><small>PROPERTY CAMPAIGN</small><strong>250,000 transitions</strong><span>Inspect campaign →</span></a>
                  <a href="flight-reference/verification/cbmc_harness.c"><small>FORMAL CHECK</small><strong>CBMC harness</strong><span>Inspect bounded model →</span></a>

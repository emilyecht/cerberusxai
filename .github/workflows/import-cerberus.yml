                <div class="frame-shell"><iframe src="assurance-workbench.html" title="CERBERUS Assurance Workbench" loading="lazy"></iframe></div>
              </section>

              <section id="kernel" class="module section kernel-section">
                <header class="module-head"><div><p class="eyebrow">Module 04 · executable</p><h2>Flight Reference Kernel</h2></div><div><span class="status executable">EXECUTABLE</span><a href="flight-kernel.html">Open standalone ↗</a></div></header>

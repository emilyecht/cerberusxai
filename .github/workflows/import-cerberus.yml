name: Import CERBERUS Pages into CERBERUS XAI

on:
  push:
    paths:
      - ".github/workflows/import-cerberus.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CERBERUS XAI
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone CERBERUS Pages source
        run: git clone --depth 1 https://github.com/emilyecht/cerberus-pages.git /tmp/cerberus-pages

      - name: Transfer source and build unified front page
        shell: bash
        run: |
          set -euo pipefail

          rsync -a --exclude '.git' /tmp/cerberus-pages/ ./
          cp index.html observatory.html
          cp README.md CERBERUS_PAGES_README.md

          cat > index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta name="author" content="Emily Echterhoff">
            <meta name="theme-color" content="#080b09">
            <meta name="description" content="CERBERUS XAI — a unified single-page research interface for runtime independence budgeting, authority control, adversarial scenarios, assurance evidence, and the executable flight reference kernel.">
            <title>CERBERUS XAI — Unified Assurance Interface</title>
            <link rel="stylesheet" href="cerberusx.css">
          </head>
          <body>
            <header class="masthead">
              <a class="wordmark" href="#top"><span>◁◁◁</span>CERBERUS XAI</a>
              <nav aria-label="Single-page navigation">
                <a href="#overview">Overview</a>
                <a href="#observatory">Observatory</a>
                <a href="#incidents">Incidents</a>
                <a href="#workbench">Workbench</a>
                <a class="kernel-link" href="#kernel">Flight Kernel</a>
                <a href="#code">Code</a>
              </nav>
            </header>

            <main id="top">
              <section class="hero">
                <div class="hero-copy">
                  <p class="eyebrow">Unified assurance surface · all major interfaces on one page</p>
                  <h1>Intelligence may propose.<br><em>Evidence controls authority.</em></h1>
                  <p class="lede">CERBERUS XAI brings the Independence Observatory, adversarial Incident Theatre, Assurance Workbench, and executable Flight Reference Kernel into one continuous research interface. Nothing is hidden behind a scrolling page selector.</p>
                  <div class="hero-actions">
                    <a class="button" href="#kernel">Run the executable kernel</a>
                    <a class="button ghost" href="#observatory">Enter the full interface</a>
                  </div>
                </div>
                <aside class="hero-card" aria-label="CERBERUS architecture summary">
                  <p>AUTHORITY TOPOLOGY</p>
                  <ol>
                    <li><b>Pilot</b><span>proposes only</span></li>
                    <li><b>Vigil</b><span>measures independence evidence</span></li>
                    <li><b>Watchdog</b><span>applies deterministic gates</span></li>
                    <li><b>Anchor</b><span>owns survivable actuation</span></li>
                  </ol>
                  <div><small>Strategic actuator path</small><strong>NONE</strong></div>
                </aside>
              </section>

              <section id="overview" class="overview section">
                <header class="section-head">
                  <div><p class="eyebrow">Program map</p><h2>One architecture. Four inspectable surfaces.</h2></div>
                  <p>Each module remains a complete runnable artifact, but all four are embedded below in ordinary document flow. The source code, tests, specifications, workers, and deployment assets are retained in this repository.</p>
                </header>
                <div class="module-map">
                  <a href="#observatory"><b>01</b><h3>Independence Observatory</h3><p>Vigil traces, authority law, Structural FCOI, and stress families.</p><span>Open section →</span></a>

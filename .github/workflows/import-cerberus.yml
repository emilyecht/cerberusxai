          CSS

          cat > cerberusx.js <<'JS'
          (() => {
            'use strict';
            const frames = [...document.querySelectorAll('iframe')];
            const resize = frame => {
              try {
                const doc = frame.contentDocument;
                if (!doc) return;
                const body = doc.body;
                const root = doc.documentElement;
                const height = Math.max(
                  body?.scrollHeight || 0,
                  body?.offsetHeight || 0,
                  root?.scrollHeight || 0,
                  root?.offsetHeight || 0,
                  720
                );
                frame.style.height = `${Math.min(height + 8, 16000)}px`;
              } catch (_) {
                frame.style.height = '980px';
              }
            };

            frames.forEach(frame => {
              frame.addEventListener('load', () => {
                resize(frame);
                setTimeout(() => resize(frame), 400);
                setTimeout(() => resize(frame), 1500);
              });
            });

            window.addEventListener('resize', () => frames.forEach(resize));
          })();
          JS

          cat > README.md <<'MD'
          # CERBERUS XAI

          A unified single-page presentation of **CERBERUS: Runtime Independence Budgeting for Layered Assurance in Autonomous Systems**.

          The repository transfers the complete `cerberus-pages` research interface and preserves its standalone modules while making all four major surfaces available on one front page:

          - Independence Observatory
          - Incident Theatre
          - Assurance Workbench
          - Flight Reference Kernel

          The original front page is retained as `observatory.html`, and the original repository guide is retained as `CERBERUS_PAGES_README.md`.

          ## Local use

          Serve the repository so Web Workers and embedded same-origin modules load correctly:

          ```bash
          python -m http.server 8080
          ```

          Then open `http://localhost:8080/`.

          ## Evidence boundary

          This is a research communication and reference-code repository. It is not flight software, certification evidence, an operational detector, or a completed safety case. The executable C kernel establishes only its declared software properties under its stated inputs and assumptions.

          Copyright © 2026 Emily Echterhoff. All rights reserved.
          MD

          cat > .github/workflows/pages.yml <<'YAML'
          name: Deploy CERBERUS XAI Pages

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            deploy:
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Configure Pages
                  uses: actions/configure-pages@v5
                - name: Upload static site
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: .
                - name: Deploy
                  id: deployment
                  uses: actions/deploy-pages@v4
          YAML

          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No transfer changes detected."
            exit 0
          fi
          git commit -m "Transfer CERBERUS Pages into unified front page"
          git push origin HEAD:main

                </div>
              </section>

              <section id="observatory" class="module section dark">
                <header class="module-head"><div><p class="eyebrow">Module 01</p><h2>Independence Observatory</h2></div><div><span class="status">INTERACTIVE</span><a href="observatory.html">Open standalone ↗</a></div></header>
                <p class="module-note">Matched-model Vigil evidence, authority contraction and restoration, Structural FCOI, and the Stress Suite atlas.</p>
                <div class="frame-shell"><iframe src="observatory.html" title="CERBERUS Independence Observatory" loading="eager"></iframe></div>
              </section>

              <section id="incidents" class="module section paper">
                <header class="module-head"><div><p class="eyebrow">Module 02</p><h2>Incident Theatre</h2></div><div><span class="status">ADVERSARIAL</span><a href="scenarios.html">Open standalone ↗</a></div></header>
                <p class="module-note">Synthetic mission cases test whether intelligence can be separated from life-critical authority under faults, blackout, and deception.</p>
                <div class="frame-shell"><iframe src="scenarios.html" title="CERBERUS Incident Theatre" loading="lazy"></iframe></div>
              </section>

              <section id="workbench" class="module section dark">

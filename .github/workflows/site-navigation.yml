name: Verify CERBERUS site navigation

on:
  pull_request:
    paths:
      - "index.html"
      - "scenarios.html"
      - "assurance-workbench.html"
      - "flight-kernel.html"
      - "site-nav.css"
      - "tools/inject_site_nav.py"
      - "tools/test_site_nav.py"
      - ".github/workflows/pages.yml"
      - ".github/workflows/site-navigation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  navigation:
    name: inject + validate all page routes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment image
        run: |
          rm -rf _site
          mkdir _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'tools' \
            ./ _site/
          python3 tools/inject_site_nav.py _site

      - name: Validate global navigation
        run: python3 tools/test_site_nav.py _site

name: Deploy CERBERUS Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site with global page access
        run: |
          rm -rf _site
          mkdir _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'tools' \
            ./ _site/
          python3 tools/inject_site_nav.py _site
          python3 tools/test_site_nav.py _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
